# Gstack Workflow Add Or Update Shared Resolver

## Action

Follow the add-or-update-shared-resolver workflow:
1. Implement or update a resolver function in scripts/resolvers/*.ts.
2. Register the resolver in scripts/resolvers/index.ts.
3. Add or update template placeholders (e.g., {{NEW_RESOLVER}}) in one or more SKILL.md.tmpl files.
4. Regenerate affected SKILL.md files.
5. Add or update tests for the resolver and template output.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: scripts/resolvers/*.ts, scripts/resolvers/index.ts, */*/SKILL.md.tmpl

