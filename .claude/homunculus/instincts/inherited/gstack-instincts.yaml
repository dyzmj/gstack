# Gstack Workflow Skill Template Update And Regeneration

## Action

Follow the skill-template-update-and-regeneration workflow:
1. Edit one or more SKILL.md.tmpl files or scripts/resolvers/*.ts (e.g., add new section, update preamble, fix bug).
2. Run the doc generation script (e.g., bun run gen:skill-docs) to regenerate all SKILL.md files from templates.
3. Optionally update related tests to reflect new template/resolver behavior.
4. Commit regenerated SKILL.md files along with template/resolver changes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: */*/SKILL.md.tmpl, scripts/resolvers/*.ts, */*/SKILL.md

